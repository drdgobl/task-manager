<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f2f2f7;
    color: #212529;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Top Nav ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 1px solid #dee2e6;
    padding: 0 16px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar h1 {
    font-size: 16px;
    font-weight: 600;
    color: #343a40;
  }
  .tabs {
    display: flex;
    gap: 4px;
  }
  .tab {
    padding: 6px 16px;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #495057;
    transition: background .15s, color .15s;
  }
  .tab:hover { background: #f1f3f5; }
  .tab.active {
    background: #343a40;
    color: #fff;
    border-color: #343a40;
  }
  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #495057;
    transition: background .15s;
  }
  .btn:hover { background: #f1f3f5; }
  #importFile { display: none; }

  /* Icon buttons in top bar */
  .icon-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 18px;
    color: #868e96;
    padding: 6px;
    border-radius: 6px;
    transition: color .15s, background .15s;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { color: #495057; background: #f1f3f5; }

  /* Overflow menu */
  .overflow-wrap {
    position: relative;
  }
  .overflow-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
    min-width: 160px;
    z-index: 110;
    overflow: hidden;
  }
  .overflow-menu.show { display: block; }
  .overflow-item {
    display: block;
    width: 100%;
    padding: 10px 16px;
    border: none;
    background: none;
    font-size: 14px;
    color: #212529;
    text-align: left;
    cursor: pointer;
  }
  .overflow-item:hover { background: #f1f3f5; }
  .overflow-item + .overflow-item { border-top: 1px solid #f1f3f5; }

  /* Filter toggle button */
  .filter-toggle {
    display: none;
  }

  /* ── Filter Bar ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #dee2e6;
    flex-wrap: wrap;
  }
  .filter-bar label {
    font-size: 11px;
    font-weight: 600;
    color: #868e96;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .filter-bar select {
    padding: 5px 10px;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    color: #495057;
    cursor: pointer;
    min-width: 100px;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Card List Container ── */
  .list-view {
    padding: 0 0 100px;
    max-width: 700px;
    margin: 0 auto;
  }

  /* ── Date Section Headers ── */
  .date-section-header {
    font-size: 20px;
    font-weight: 700;
    color: #1c1c1e;
    padding: 20px 20px 6px;
  }
  .date-section-header.overdue {
    color: #e03131;
  }

  /* ── Task Cards ── */
  .task-card {
    background: #fff;
    margin: 0 12px 1px;
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .task-card:first-child,
  .date-section-header + .task-card {
    border-radius: 10px 10px 0 0;
  }
  .task-card:last-child,
  .task-card.section-last {
    border-radius: 0 0 10px 10px;
    margin-bottom: 0;
  }
  .task-card:only-child,
  .task-card.section-only {
    border-radius: 10px;
  }
  .task-card:not(:last-child):not(.section-last)::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 56px;
    right: 16px;
    height: 1px;
    background: #e5e5ea;
  }
  .task-card:hover { background: #f9f9fb; }
  .task-card.expanded {
    background: #fff;
    z-index: 2;
  }
  .task-card.done .card-task-name {
    color: #adb5bd;
    text-decoration: line-through;
  }
  .task-card.done .card-client {
    color: #ced4da;
  }

  /* Circular checkbox */
  .card-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #c7c7cc;
    background: #fff;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .card-checkbox:hover {
    border-color: #007aff;
  }
  .card-checkbox.checked {
    background: #007aff;
    border-color: #007aff;
  }
  .card-checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  /* Card content */
  .card-body {
    flex: 1;
    min-width: 0;
  }
  .card-task-name {
    font-size: 16px;
    font-weight: 500;
    color: #1c1c1e;
    line-height: 1.3;
    word-wrap: break-word;
  }
  .card-subtitle {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    flex-wrap: wrap;
  }
  .card-client {
    font-size: 13px;
    color: #8e8e93;
  }
  .card-due-label {
    font-size: 12px;
    color: #8e8e93;
  }
  .card-due-label.overdue {
    color: #e03131;
    font-weight: 600;
  }
  .card-due-label.today {
    color: #007aff;
    font-weight: 600;
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .2px;
  }
  .badge-urgency-3 { background: #ffd8d8; color: #c92a2a; }
  .badge-urgency-2 { background: #fff3bf; color: #e67700; }
  .badge-importance-3 { background: #d0ebff; color: #1971c2; }
  .badge-importance-2 { background: #e7f5ff; color: #1971c2; }
  .badge-effort-1 { background: #d3f9d8; color: #2b8a3e; }
  .badge-effort-2 { background: #fff3bf; color: #e67700; }
  .badge-effort-3 { background: #ffd8d8; color: #c92a2a; }

  /* ── Expanded Edit Area ── */
  .card-edit {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #e5e5ea;
  }
  .task-card.expanded .card-edit {
    display: block;
  }
  .edit-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }
  .edit-row label {
    font-size: 12px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: .3px;
    width: 72px;
    flex-shrink: 0;
  }
  .edit-row input[type="text"],
  .edit-row input[type="date"],
  .edit-row select {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #d1d1d6;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: #1c1c1e;
    background: #f9f9fb;
    min-width: 0;
  }
  .edit-row input:focus,
  .edit-row select:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 3px rgba(0,122,255,.15);
    background: #fff;
  }
  .edit-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 4px;
  }
  .delete-card-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    background: none;
    color: #e03131;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .delete-card-btn:hover { background: #fff5f5; }

  /* Client auto-suggest */
  .suggest-wrap { position: relative; flex: 1; min-width: 0; }
  .suggest-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    z-index: 50;
    max-height: 160px;
    overflow-y: auto;
    display: none;
  }
  .suggest-list.show { display: block; }
  .suggest-item {
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .suggest-item:hover, .suggest-item.active { background: #e9ecef; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #868e96;
  }
  .empty-state p { margin-bottom: 16px; font-size: 15px; }
  .empty-state button {
    padding: 8px 20px;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    background: #343a40;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  /* ── FAB (Floating Action Button) ── */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #007aff;
    color: #fff;
    border: none;
    font-size: 30px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,122,255,.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s;
    z-index: 90;
    line-height: 1;
  }
  .fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(0,122,255,.5);
  }
  .fab:active {
    transform: scale(0.95);
  }

  /* Confirmation dialog overlay */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .confirm-box {
    background: #fff;
    border-radius: 14px;
    padding: 24px 28px;
    max-width: 380px;
    box-shadow: 0 8px 30px rgba(0,0,0,.18);
  }
  .confirm-box p { font-size: 14px; margin-bottom: 16px; color: #495057; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-actions button {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid #dee2e6;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .confirm-cancel { background: #fff; color: #495057; }
  .confirm-cancel:hover { background: #f1f3f5; }
  .confirm-danger { background: #e03131; color: #fff; border-color: #e03131; }
  .confirm-danger:hover { background: #c92a2a; }

  /* ── Matrix View ── */
  .matrix-view {
    display: none;
    padding: 16px 24px 80px;
  }
  .matrix-view.active { display: block; }

  .uncat-banner {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: #856404;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .uncat-banner a {
    color: #856404;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
  }

  .matrix-grid {
    display: grid;
    grid-template-columns: auto 1fr 1fr;
    grid-template-rows: auto 1fr 1fr;
    gap: 0;
    height: calc(100vh - 160px);
    min-height: 500px;
  }

  .matrix-corner { }
  .matrix-col-label {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #495057;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .matrix-row-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #495057;
    padding: 8px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
  }
  .quadrant {
    border: 1px solid #dee2e6;
    border-radius: 10px;
    margin: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .quadrant-header {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #fff;
    flex-shrink: 0;
  }
  .quadrant-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .quadrant-do            { background: #d4edda; }
  .quadrant-do .quadrant-header    { background: #28a745; }
  .quadrant-schedule      { background: #cce5ff; }
  .quadrant-schedule .quadrant-header { background: #007bff; }
  .quadrant-delegate      { background: #fff3cd; }
  .quadrant-delegate .quadrant-header { background: #ffc107; color: #212529; }
  .quadrant-delete        { background: #f8d7da; }
  .quadrant-delete .quadrant-header   { background: #dc3545; }

  .matrix-card {
    background: #fff;
    border: 1px solid rgba(0,0,0,.08);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    transition: box-shadow .15s;
  }
  .matrix-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .matrix-card input[type="checkbox"] {
    width: 15px;
    height: 15px;
    margin-top: 2px;
    cursor: pointer;
    accent-color: #343a40;
    flex-shrink: 0;
  }
  .matrix-card-content { flex: 1; min-width: 0; }
  .matrix-card-client {
    font-size: 12px;
    font-weight: 700;
    color: #495057;
    margin-bottom: 2px;
  }
  .matrix-card-task {
    font-size: 13px;
    color: #212529;
    line-height: 1.4;
  }
  .matrix-card-due {
    font-size: 11px;
    color: #868e96;
    margin-top: 4px;
  }

  .effort-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .effort-1 { background: #d3f9d8; color: #2b8a3e; }
  .effort-2 { background: #fff3bf; color: #e67700; }
  .effort-3 { background: #ffd8d8; color: #c92a2a; }

  .quadrant-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #adb5bd;
    font-size: 13px;
    font-style: italic;
  }

  /* ── Sync Indicator ── */
  .sync-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #adb5bd;
    flex-shrink: 0;
    transition: background .3s;
  }
  .sync-dot.syncing { background: #fcc419; animation: pulse .8s infinite alternate; }
  .sync-dot.synced  { background: #51cf66; }
  .sync-dot.error   { background: #ff6b6b; }
  @keyframes pulse { from { opacity: 1; } to { opacity: .4; } }
  .sync-label {
    font-size: 11px;
    color: #868e96;
    white-space: nowrap;
  }

  /* ── Settings Dialog ── */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .settings-box {
    background: #fff;
    border-radius: 14px;
    padding: 28px 32px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 8px 30px rgba(0,0,0,.18);
  }
  .settings-box h2 {
    font-size: 16px;
    font-weight: 700;
    color: #212529;
    margin-bottom: 4px;
  }
  .settings-box .subtitle {
    font-size: 12px;
    color: #868e96;
    margin-bottom: 20px;
  }
  .settings-field {
    margin-bottom: 16px;
  }
  .settings-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #495057;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 4px;
  }
  .settings-field input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    font-size: 13px;
    font-family: monospace;
    color: #495057;
  }
  .settings-field input:focus {
    outline: none;
    border-color: #339af0;
    box-shadow: 0 0 0 2px rgba(51,154,240,.2);
  }
  .settings-field .hint {
    font-size: 11px;
    color: #adb5bd;
    margin-top: 4px;
  }
  .settings-status {
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 16px;
  }
  .settings-status.connected { background: #d3f9d8; color: #2b8a3e; }
  .settings-status.disconnected { background: #f1f3f5; color: #868e96; }
  .settings-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .settings-actions button {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid #dee2e6;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .settings-connect { background: #343a40; color: #fff; border-color: #343a40; }
  .settings-connect:hover { background: #212529; }
  .settings-disconnect { background: #fff; color: #e03131; border-color: #e03131; }
  .settings-disconnect:hover { background: #fff5f5; }
  .settings-close { background: #fff; color: #495057; }
  .settings-close:hover { background: #f1f3f5; }

  /* ── Responsive ── */
  @media (max-width: 767px) {
    .top-bar {
      padding: 0 12px;
      gap: 6px;
    }
    .top-bar h1 { font-size: 15px; }
    .filter-toggle { display: flex; }
    .filter-bar {
      display: none;
      padding: 10px 12px;
    }
    .filter-bar.show { display: flex; }
    .filter-bar select { min-width: 80px; font-size: 12px; }
    .list-view { padding: 0 0 90px; }
    .task-card { margin: 0 0 1px; border-radius: 0 !important; padding: 12px 14px; }
    .task-card::after { left: 48px !important; right: 14px !important; }
    .date-section-header { padding: 18px 14px 6px; font-size: 18px; }
    .fab { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 26px; }
    .edit-row { flex-wrap: wrap; }
    .edit-row label { width: 100%; margin-bottom: -4px; }
    .sync-label { display: none; }
  }

  @media (min-width: 768px) {
    .list-view {
      padding: 16px 24px 100px;
    }
    .task-card { border-radius: 0; }
    .date-section-header + .task-card { border-radius: 10px 10px 0 0; }
    .filter-bar { display: flex !important; }
  }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="top-bar">
  <h1>Task Manager</h1>
  <div class="tabs">
    <button class="tab active" data-view="list">Tasks</button>
    <button class="tab" data-view="matrix">Matrix</button>
  </div>
  <div class="top-actions">
    <div class="sync-wrap" id="syncWrap" style="display:none;">
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-label" id="syncLabel">Not connected</span>
    </div>
    <button class="icon-btn" id="filterToggleBtn" title="Toggle filters">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" title="Cloud Sync Settings">&#9881;</button>
    <div class="overflow-wrap">
      <button class="icon-btn" id="overflowBtn" title="More actions">&#8943;</button>
      <div class="overflow-menu" id="overflowMenu">
        <button class="overflow-item" id="exportBtn">Export Tasks</button>
        <button class="overflow-item" id="importBtn">Import Tasks</button>
      </div>
    </div>
    <input type="file" id="importFile" accept=".json">

<script>
// ── Data ──
const STORAGE_KEY = 'taskmanager_tasks';
let tasks = [];
let sortCol = null;
let sortDir = 'asc';
let saveTimer = null;
let expandedTaskId = null;

const DEFAULT_TASKS = [
  { client: 'Sapphire Social', task: 'Map out social strategy & creative needs', urgency: null, importance: 2, effort: 2, dueDate: '2026-03-06', done: false },
  { client: 'ECU', task: 'Make plan for leadership workshop & deck', urgency: null, importance: 2, effort: 3, dueDate: '2026-03-27', done: false },
  { client: 'Green Llama', task: 'Schedule 2 meetings: design k/o + report review', urgency: null, importance: 3, effort: 1, dueDate: '2026-03-05', done: false },
  { client: 'Green Llama', task: 'Create report for Meta test #1 results', urgency: null, importance: 3, effort: 2, dueDate: '2026-03-05', done: false },
  { client: 'Green Llama', task: 'Schedule time to review test 1 report', urgency: null, importance: 3, effort: 1, dueDate: '2026-03-05', done: false },
  { client: 'Green Llama', task: 'Create briefs + k/o Stacey and Kelsey on test #2 video needs', urgency: null, importance: 3, effort: 2, dueDate: '2026-03-05', done: false },
  { client: "Yella's", task: 'Create new social strategy for Danielle', urgency: null, importance: 3, effort: 2, dueDate: '2026-03-04', done: false },
  { client: 'Rendezvous', task: 'Map out social strategy; lunch, system, model(?)', urgency: null, importance: 2, effort: 2, dueDate: '2026-03-05', done: false },
  { client: 'Mountain Air', task: 'Use Claude to make deck for leadership pitch', urgency: null, importance: 2, effort: 2, dueDate: '2026-03-06', done: false },
];

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function loadTasks() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      tasks = JSON.parse(raw);
      if (!localStorage.getItem('taskmanager_v2_migrated')) {
        tasks.forEach(t => { t.urgency = null; });
        localStorage.setItem('taskmanager_v2_migrated', '1');
        saveTasksImmediate();
      }
      return;
    } catch(e) { /* fall through */ }
  }
  tasks = DEFAULT_TASKS.map(t => ({
    id: generateId(),
    ...t,
    createdAt: new Date().toISOString()
  }));
  localStorage.setItem('taskmanager_v2_migrated', '1');
  saveTasks();
}

function saveTasks() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }, 300);
}

function saveTasksImmediate() {
  clearTimeout(saveTimer);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

// ── Helpers ──
function uniqueClients() {
  const set = new Set();
  tasks.forEach(t => { if (t.client) set.add(t.client); });
  return [...set].sort();
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function isoFromInput(val) {
  return val || null;
}

// ── Auto-Urgency from Due Date ──
function daysUntil(dueDateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(dueDateStr + 'T00:00:00');
  return Math.round((due - today) / (1000 * 60 * 60 * 24));
}

function getEffectiveUrgency(task) {
  if (task.urgency != null) return task.urgency;
  if (!task.dueDate) return 1;
  const days = daysUntil(task.dueDate);
  return days <= 2 ? 3 : 1;
}

const EFFORT_LABELS = { 1: 'Quick', 2: 'Focus', 3: 'Deep' };

// ── Relative date label ──
function getRelativeDateLabel(dueDateStr) {
  if (!dueDateStr) return '';
  const days = daysUntil(dueDateStr);
  if (days < -1) return Math.abs(days) + ' days overdue';
  if (days === -1) return '1 day overdue';
  if (days === 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  if (days <= 7) {
    const d = new Date(dueDateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long' });
  }
  return formatDate(dueDateStr);
}

// ── Date section grouping ──
function getDateSection(dueDateStr) {
  if (!dueDateStr) return { key: 'nodate', label: 'No Date', order: 900 };
  const days = daysUntil(dueDateStr);
  if (days < 0) return { key: 'overdue', label: 'Overdue', order: 0, isOverdue: true };
  if (days === 0) return { key: 'today', label: 'Today', order: 1 };
  if (days === 1) return { key: 'tomorrow', label: 'Tomorrow', order: 2 };
  if (days <= 7) {
    const d = new Date(dueDateStr + 'T00:00:00');
    const name = d.toLocaleDateString('en-US', { weekday: 'long' });
    return { key: 'day-' + days, label: name, order: 2 + days };
  }
  return { key: 'later', label: 'Later', order: 800 };
}

// ── Filtering ──
function getFiltered() {
  const status = document.getElementById('filterStatus').value;
  const client = document.getElementById('filterClient').value;
  const urgency = document.getElementById('filterUrgency').value;
  const importance = document.getElementById('filterImportance').value;
  const effort = document.getElementById('filterEffort').value;

  return tasks.filter(t => {
    if (status === 'active' && t.done) return false;
    if (status === 'completed' && !t.done) return false;
    if (client && t.client !== client) return false;
    if (urgency === 'urgent' && getEffectiveUrgency(t) < 2) return false;
    if (urgency === 'not-urgent' && getEffectiveUrgency(t) >= 2) return false;
    if (importance && t.importance != importance) return false;
    if (effort && t.effort != effort) return false;
    return true;
  });
}

// ── Sorting ──
function getSorted(list) {
  if (!sortCol) return list;
  const copy = [...list];
  copy.sort((a, b) => {
    let va = sortCol === 'urgency' ? getEffectiveUrgency(a) : a[sortCol];
    let vb = sortCol === 'urgency' ? getEffectiveUrgency(b) : b[sortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') {
      return sortDir === 'asc' ? va - vb : vb - va;
    }
    va = String(va).toLowerCase();
    vb = String(vb).toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  return copy;
}

// ── Client Filter Dropdown ──
function updateClientFilter() {
  const sel = document.getElementById('filterClient');
  const current = sel.value;
  const clients = uniqueClients();
  sel.innerHTML = '<option value="">All</option>';
  clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    if (c === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── Render Cards ──
function render() {
  updateClientFilter();
  const filtered = getSorted(getFiltered());
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  if (tasks.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <p>No tasks yet. Tap + to add your first task.</p>
    </div>`;
    return;
  }

  const status = document.getElementById('filterStatus').value;
  if (filtered.length === 0) {
    const msg = status === 'completed'
      ? 'No completed tasks yet.'
      : 'No tasks match the current filters.';
    container.innerHTML = `<div class="empty-state"><p>${msg}</p></div>`;
    return;
  }

  // Group tasks by date section (only when not custom-sorted)
  if (!sortCol) {
    const groups = new Map();
    filtered.forEach(task => {
      const section = getDateSection(task.dueDate);
      if (!groups.has(section.key)) {
        groups.set(section.key, { ...section, tasks: [] });
      }
      groups.get(section.key).tasks.push(task);
    });

    // Sort groups by order, then within each group sort by dueDate
    const sortedGroups = [...groups.values()].sort((a, b) => a.order - b.order);
    sortedGroups.forEach(group => {
      group.tasks.sort((a, b) => {
        const da = a.dueDate || '9999-99-99';
        const db = b.dueDate || '9999-99-99';
        return da.localeCompare(db);
      });
    });

    sortedGroups.forEach(group => {
      const header = document.createElement('div');
      header.className = 'date-section-header' + (group.isOverdue ? ' overdue' : '');
      header.textContent = group.label;
      container.appendChild(header);

      group.tasks.forEach((task, i) => {
        const card = createTaskCard(task);
        // Assign rounding classes for grouped cards
        if (group.tasks.length === 1) {
          card.classList.add('section-only');
        } else if (i === group.tasks.length - 1) {
          card.classList.add('section-last');
        }
        container.appendChild(card);
      });
    });
  } else {
    // Custom sort: flat list, no date sections
    filtered.forEach(task => {
      container.appendChild(createTaskCard(task));
    });
  }
}

function createTaskCard(task) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.dataset.id = task.id;
  if (task.done) card.classList.add('done');
  if (expandedTaskId === task.id) card.classList.add('expanded');

  // Checkbox
  const cb = document.createElement('div');
  cb.className = 'card-checkbox' + (task.done ? ' checked' : '');
  cb.addEventListener('click', (e) => {
    e.stopPropagation();
    task.done = !task.done;
    saveTasks();
    render();
  });
  card.appendChild(cb);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  // Task name
  const name = document.createElement('div');
  name.className = 'card-task-name';
  name.textContent = task.task || 'Untitled';
  body.appendChild(name);

  // Subtitle line
  const subtitle = document.createElement('div');
  subtitle.className = 'card-subtitle';

  if (task.client) {
    const clientEl = document.createElement('span');
    clientEl.className = 'card-client';
    clientEl.textContent = task.client;
    subtitle.appendChild(clientEl);
  }

  if (task.dueDate) {
    const dueLabel = document.createElement('span');
    const days = daysUntil(task.dueDate);
    const relText = getRelativeDateLabel(task.dueDate);
    dueLabel.className = 'card-due-label';
    if (days < 0) dueLabel.classList.add('overdue');
    else if (days === 0) dueLabel.classList.add('today');
    dueLabel.textContent = relText;
    if (task.client) {
      const sep = document.createElement('span');
      sep.textContent = ' · ';
      sep.style.cssText = 'color:#c7c7cc;font-size:12px';
      subtitle.appendChild(sep);
    }
    subtitle.appendChild(dueLabel);
  }

  // Badges
  const effUrg = getEffectiveUrgency(task);
  if (effUrg >= 2) {
    const b = document.createElement('span');
    b.className = 'badge badge-urgency-' + effUrg;
    b.textContent = effUrg === 3 ? 'Urgent' : 'Med';
    subtitle.appendChild(b);
  }
  if (task.importance != null && task.importance >= 2) {
    const b = document.createElement('span');
    b.className = 'badge badge-importance-' + task.importance;
    b.textContent = task.importance === 3 ? 'Important' : 'Med';
    subtitle.appendChild(b);
  }
  if (task.effort != null) {
    const b = document.createElement('span');
    b.className = 'badge badge-effort-' + task.effort;
    b.textContent = EFFORT_LABELS[task.effort];
    subtitle.appendChild(b);
  }

  body.appendChild(subtitle);

  // Edit area (shown when expanded)
  const edit = document.createElement('div');
  edit.className = 'card-edit';

  // Task name input
  const taskRow = document.createElement('div');
  taskRow.className = 'edit-row';
  taskRow.innerHTML = '<label>Task</label>';
  const taskInput = document.createElement('input');
  taskInput.type = 'text';
  taskInput.value = task.task || '';
  taskInput.addEventListener('input', () => {
    task.task = taskInput.value;
    name.textContent = taskInput.value || 'Untitled';
    saveTasks();
  });
  taskInput.addEventListener('click', (e) => e.stopPropagation());
  taskRow.appendChild(taskInput);
  edit.appendChild(taskRow);

  // Client input with auto-suggest
  const clientRow = document.createElement('div');
  clientRow.className = 'edit-row';
  clientRow.innerHTML = '<label>Client</label>';
  const suggestWrap = document.createElement('div');
  suggestWrap.className = 'suggest-wrap';
  const clientInput = document.createElement('input');
  clientInput.type = 'text';
  clientInput.value = task.client || '';
  clientInput.placeholder = 'Client name';
  const suggestList = document.createElement('div');
  suggestList.className = 'suggest-list';
  suggestWrap.appendChild(clientInput);
  suggestWrap.appendChild(suggestList);

  clientInput.addEventListener('input', () => {
    task.client = clientInput.value;
    saveTasks();
    showClientSuggestions(clientInput, suggestList, task);
  });
  clientInput.addEventListener('focus', () => {
    showClientSuggestions(clientInput, suggestList, task);
  });
  clientInput.addEventListener('blur', () => {
    setTimeout(() => suggestList.classList.remove('show'), 150);
  });
  clientInput.addEventListener('click', (e) => e.stopPropagation());
  clientInput.addEventListener('keydown', (e) => {
    handleSuggestKeyForInput(e, clientInput, suggestList, task);
  });

  clientRow.appendChild(suggestWrap);
  edit.appendChild(clientRow);

  // Due date
  const dueRow = document.createElement('div');
  dueRow.className = 'edit-row';
  dueRow.innerHTML = '<label>Due</label>';
  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  dateInput.value = task.dueDate || '';
  dateInput.addEventListener('change', () => {
    task.dueDate = isoFromInput(dateInput.value);
    saveTasks();
    render();
  });
  dateInput.addEventListener('click', (e) => e.stopPropagation());
  dueRow.appendChild(dateInput);
  edit.appendChild(dueRow);

  // Urgency
  const urgRow = document.createElement('div');
  urgRow.className = 'edit-row';
  urgRow.innerHTML = '<label>Urgency</label>';
  const selUrg = document.createElement('select');
  const autoLabel = task.dueDate ? `Auto (${getEffectiveUrgency({...task, urgency: null})})` : 'Auto';
  [{ v: '', label: autoLabel }, { v: '1', label: '1 — Not Urgent' }, { v: '2', label: '2 — Med' }, { v: '3', label: '3 — Urgent' }].forEach(({v, label}) => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = label;
    if ((task.urgency != null && String(task.urgency) === v) || (task.urgency == null && v === '')) opt.selected = true;
    selUrg.appendChild(opt);
  });
  selUrg.addEventListener('change', () => {
    task.urgency = selUrg.value ? Number(selUrg.value) : null;
    saveTasks();
    render();
  });
  selUrg.addEventListener('click', (e) => e.stopPropagation());
  urgRow.appendChild(selUrg);
  edit.appendChild(urgRow);

  // Importance
  const impRow = document.createElement('div');
  impRow.className = 'edit-row';
  impRow.innerHTML = '<label>Importance</label>';
  const selImp = document.createElement('select');
  [{ v: '', label: '—' }, { v: '1', label: '1 — Low' }, { v: '2', label: '2 — Med' }, { v: '3', label: '3 — High' }].forEach(({v, label}) => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = label;
    if ((task.importance != null && String(task.importance) === v) || (task.importance == null && v === '')) opt.selected = true;
    selImp.appendChild(opt);
  });
  selImp.addEventListener('change', () => {
    task.importance = selImp.value ? Number(selImp.value) : null;
    saveTasks();
    render();
  });
  selImp.addEventListener('click', (e) => e.stopPropagation());
  impRow.appendChild(selImp);
  edit.appendChild(impRow);

  // Effort
  const effRow = document.createElement('div');
  effRow.className = 'edit-row';
  effRow.innerHTML = '<label>Effort</label>';
  const selEff = document.createElement('select');
  [{ v: '', label: '—' }, { v: '1', label: '1 — Quick' }, { v: '2', label: '2 — Focus' }, { v: '3', label: '3 — Deep' }].forEach(({v, label}) => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = label;
    if ((task.effort != null && String(task.effort) === v) || (task.effort == null && v === '')) opt.selected = true;
    selEff.appendChild(opt);
  });
  selEff.addEventListener('change', () => {
    task.effort = selEff.value ? Number(selEff.value) : null;
    saveTasks();
    render();
  });
  selEff.addEventListener('click', (e) => e.stopPropagation());
  effRow.appendChild(selEff);
  edit.appendChild(effRow);

  // Delete button
  const actions = document.createElement('div');
  actions.className = 'edit-actions';
  const delBtn = document.createElement('button');
  delBtn.className = 'delete-card-btn';
  delBtn.textContent = 'Delete Task';
  delBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    confirmDelete(task);
  });
  actions.appendChild(delBtn);
  edit.appendChild(actions);

  body.appendChild(edit);
  card.appendChild(body);

  // Tap to expand/collapse
  card.addEventListener('click', () => {
    if (expandedTaskId === task.id) {
      expandedTaskId = null;
    } else {
      expandedTaskId = task.id;
    }
    render();
  });

  return card;
}

// ── Client Auto-Suggest (for input fields) ──
function showClientSuggestions(input, listEl, task) {
  const val = input.value.trim().toLowerCase();
  const clients = uniqueClients().filter(c =>
    c.toLowerCase().includes(val) && c !== input.value.trim()
  );

  if (!val || clients.length === 0) {
    listEl.classList.remove('show');
    return;
  }

  listEl.innerHTML = '';
  clients.forEach(c => {
    const item = document.createElement('div');
    item.className = 'suggest-item';
    item.textContent = c;
    item.addEventListener('mousedown', (e) => {
      e.preventDefault();
      input.value = c;
      task.client = c;
      saveTasks();
      listEl.classList.remove('show');
    });
    listEl.appendChild(item);
  });
  listEl.classList.add('show');
}

function handleSuggestKeyForInput(e, input, listEl, task) {
  if (!listEl.classList.contains('show')) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    return;
  }
  const items = listEl.querySelectorAll('.suggest-item');
  let idx = [...items].findIndex(i => i.classList.contains('active'));

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (idx >= 0) items[idx].classList.remove('active');
    idx = (idx + 1) % items.length;
    items[idx].classList.add('active');
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (idx >= 0) items[idx].classList.remove('active');
    idx = idx <= 0 ? items.length - 1 : idx - 1;
    items[idx].classList.add('active');
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (idx >= 0) {
      items[idx].dispatchEvent(new MouseEvent('mousedown'));
    }
    input.blur();
  } else if (e.key === 'Escape') {
    listEl.classList.remove('show');
  }
}

// ── Add / Delete ──
function addTask() {
  const t = {
    id: generateId(),
    client: '',
    task: '',
    urgency: null,
    importance: null,
    effort: null,
    dueDate: null,
    done: false,
    createdAt: new Date().toISOString()
  };
  tasks.push(t);
  expandedTaskId = t.id;
  saveTasks();
  render();
  // Scroll to and focus the new task's name input
  setTimeout(() => {
    const card = document.querySelector(`.task-card[data-id="${t.id}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const taskInput = card.querySelector('.edit-row input[type="text"]');
      if (taskInput) taskInput.focus();
    }
  }, 50);
}

function confirmDelete(task) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <p>Delete "${task.task || 'this task'}"?</p>
      <div class="confirm-actions">
        <button class="confirm-cancel">Cancel</button>
        <button class="confirm-danger">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('.confirm-cancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('.confirm-danger').addEventListener('click', () => {
    tasks = tasks.filter(t => t.id !== task.id);
    if (expandedTaskId === task.id) expandedTaskId = null;
    saveTasksImmediate();
    overlay.remove();
    render();
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// ── Filter Handlers ──
['filterStatus', 'filterClient', 'filterUrgency', 'filterImportance', 'filterEffort'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});

// ── Filter Toggle (mobile) ──
document.getElementById('filterToggleBtn').addEventListener('click', () => {
  const bar = document.getElementById('filterBar');
  bar.classList.toggle('show');
});

// ── Overflow Menu ──
document.getElementById('overflowBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('overflowMenu').classList.toggle('show');
});
document.addEventListener('click', () => {
  document.getElementById('overflowMenu').classList.remove('show');
});

// ── FAB ──
document.getElementById('fabBtn').addEventListener('click', () => addTask());

// ── Export ──
document.getElementById('exportBtn').addEventListener('click', () => {
  document.getElementById('overflowMenu').classList.remove('show');
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tasks_backup_${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// ── Import ──
document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('overflowMenu').classList.remove('show');
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      if (!confirm('This will replace all current tasks. Continue?')) return;
      tasks = data;
      saveTasksImmediate();
      render();
    } catch(err) {
      alert('Invalid JSON file. Please select a valid task backup.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── View Switching ──
let currentView = 'list';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const view = tab.dataset.view;
    if (view === currentView) return;
    currentView = view;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const filterBar = document.getElementById('filterBar');
    const listView = document.getElementById('listView');
    const matrixView = document.getElementById('matrixView');
    const fab = document.getElementById('fabBtn');

    if (view === 'list') {
      filterBar.style.display = '';
      listView.style.display = '';
      fab.style.display = '';
      matrixView.classList.remove('active');
      render();
    } else {
      filterBar.style.display = 'none';
      listView.style.display = 'none';
      fab.style.display = 'none';
      matrixView.classList.add('active');
      renderMatrix();
    }
  });
});

// ── Matrix Rendering ──
function renderMatrix() {
  const activeTasks = tasks.filter(t => !t.done);
  const categorized = activeTasks.filter(t => t.importance != null);
  const uncatCount = activeTasks.length - categorized.length;

  const banner = document.getElementById('uncatBanner');
  if (uncatCount > 0) {
    banner.innerHTML = `<div class="uncat-banner">${uncatCount} task${uncatCount > 1 ? 's' : ''} missing Importance and not shown in the matrix. <a id="uncatLink">Go to Task List</a></div>`;
    document.getElementById('uncatLink').addEventListener('click', () => {
      document.querySelector('.tab[data-view="list"]').click();
    });
  } else {
    banner.innerHTML = '';
  }

  const quadrants = { do: [], schedule: [], delegate: [], delete: [] };
  categorized.forEach(t => {
    const urgent = getEffectiveUrgency(t) >= 2;
    const important = t.importance >= 2;
    if (urgent && important) quadrants.do.push(t);
    else if (!urgent && important) quadrants.schedule.push(t);
    else if (urgent && !important) quadrants.delegate.push(t);
    else quadrants.delete.push(t);
  });

  renderQuadrant('qDoBody', quadrants.do);
  renderQuadrant('qScheduleBody', quadrants.schedule);
  renderQuadrant('qDelegateBody', quadrants.delegate);
  renderQuadrant('qDeleteBody', quadrants.delete);
}

function renderQuadrant(containerId, taskList) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  if (taskList.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'quadrant-empty';
    empty.textContent = 'No tasks';
    container.appendChild(empty);
    return;
  }

  taskList.forEach(task => {
    const card = document.createElement('div');
    card.className = 'matrix-card';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = false;
    cb.addEventListener('change', () => {
      task.done = true;
      saveTasksImmediate();
      renderMatrix();
    });
    card.appendChild(cb);

    const content = document.createElement('div');
    content.className = 'matrix-card-content';

    if (task.client) {
      const clientEl = document.createElement('div');
      clientEl.className = 'matrix-card-client';
      clientEl.textContent = task.client;
      content.appendChild(clientEl);
    }

    const taskEl = document.createElement('div');
    taskEl.className = 'matrix-card-task';
    taskEl.textContent = task.task;
    content.appendChild(taskEl);

    const metaEl = document.createElement('div');
    metaEl.className = 'matrix-card-due';
    const parts = [];
    if (task.effort != null) parts.push(`<span class="effort-badge effort-${task.effort}">${EFFORT_LABELS[task.effort]}</span>`);
    if (task.dueDate) parts.push('Due ' + formatDate(task.dueDate));
    if (parts.length) {
      metaEl.innerHTML = parts.join(' &nbsp; ');
      content.appendChild(metaEl);
    }

    card.appendChild(content);
    container.appendChild(card);
  });
}

// ── Cloud Sync (JSONBin.io) ──
const SYNC_KEY_API = 'taskmanager_jsonbin_apikey';
const SYNC_KEY_BIN = 'taskmanager_jsonbin_binid';
let cloudSyncTimer = null;

function getSyncConfig() {
  return {
    apiKey: localStorage.getItem(SYNC_KEY_API) || '',
    binId: localStorage.getItem(SYNC_KEY_BIN) || ''
  };
}

function isSyncEnabled() {
  const c = getSyncConfig();
  return !!(c.apiKey && c.binId);
}

function updateSyncIndicator(status) {
  const wrap = document.getElementById('syncWrap');
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (!isSyncEnabled()) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'flex';
  dot.className = 'sync-dot ' + status;
  const labels = { idle: 'Connected', syncing: 'Syncing...', synced: 'Synced', error: 'Sync error' };
  label.textContent = labels[status] || status;
}

async function loadFromCloud() {
  if (!isSyncEnabled()) return;
  const { apiKey, binId } = getSyncConfig();
  try {
    updateSyncIndicator('syncing');
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { 'X-Master-Key': apiKey }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (Array.isArray(data.record)) {
      tasks = data.record;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      if (currentView === 'list') render();
      else renderMatrix();
    }
    updateSyncIndicator('synced');
  } catch (e) {
    console.error('Cloud load failed:', e);
    updateSyncIndicator('error');
  }
}

function syncToCloud() {
  if (!isSyncEnabled()) return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(async () => {
    const { apiKey, binId } = getSyncConfig();
    try {
      updateSyncIndicator('syncing');
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': apiKey
        },
        body: JSON.stringify(tasks)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      updateSyncIndicator('synced');
    } catch (e) {
      console.error('Cloud sync failed:', e);
      updateSyncIndicator('error');
    }
  }, 2000);
}

async function createBin(apiKey) {
  const res = await fetch('https://api.jsonbin.io/v3/b', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': apiKey,
      'X-Bin-Name': 'taskmanager'
    },
    body: JSON.stringify(tasks)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.metadata.id;
}

// Hook into existing save functions
const _origSaveTasks = saveTasks;
saveTasks = function() {
  _origSaveTasks();
  syncToCloud();
};

const _origSaveImmediate = saveTasksImmediate;
saveTasksImmediate = function() {
  _origSaveImmediate();
  syncToCloud();
};

// ── Settings Dialog ──
document.getElementById('settingsBtn').addEventListener('click', openSettings);

function openSettings() {
  const config = getSyncConfig();
  const connected = isSyncEnabled();

  const overlay = document.createElement('div');
  overlay.className = 'settings-overlay';
  overlay.innerHTML = `
    <div class="settings-box">
      <h2>Cloud Sync</h2>
      <p class="subtitle">Sync tasks across devices using JSONBin.io (free)</p>
      <div class="settings-status ${connected ? 'connected' : 'disconnected'}">
        ${connected ? 'Connected — tasks sync automatically' : 'Not connected — tasks stored locally only'}
      </div>
      <div class="settings-field">
        <label>API Key</label>
        <input type="text" id="settingsApiKey" placeholder="Paste your JSONBin.io API key" value="${config.apiKey}">
        <div class="hint">Get yours free at jsonbin.io → API Keys</div>
      </div>
      <div class="settings-field">
        <label>Bin ID</label>
        <input type="text" id="settingsBinId" placeholder="Auto-created on first connect" value="${config.binId}">
        <div class="hint">Share this ID to connect a second device</div>
      </div>
      <div id="settingsError" style="color:#e03131;font-size:13px;margin-bottom:12px;display:none;"></div>
      <div class="settings-actions">
        ${connected ? '<button class="settings-disconnect" id="settingsDisconnect">Disconnect</button>' : ''}
        <button class="settings-close" id="settingsClose">Cancel</button>
        <button class="settings-connect" id="settingsConnect">${connected ? 'Reconnect' : 'Connect'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#settingsClose').addEventListener('click', () => overlay.remove());

  if (connected) {
    overlay.querySelector('#settingsDisconnect').addEventListener('click', () => {
      localStorage.removeItem(SYNC_KEY_API);
      localStorage.removeItem(SYNC_KEY_BIN);
      updateSyncIndicator('idle');
      document.getElementById('syncWrap').style.display = 'none';
      overlay.remove();
    });
  }

  overlay.querySelector('#settingsConnect').addEventListener('click', async () => {
    const apiKey = overlay.querySelector('#settingsApiKey').value.trim();
    const binId = overlay.querySelector('#settingsBinId').value.trim();
    const errEl = overlay.querySelector('#settingsError');
    const btn = overlay.querySelector('#settingsConnect');

    if (!apiKey) {
      errEl.textContent = 'API key is required.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Connecting...';
    errEl.style.display = 'none';

    try {
      if (binId) {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
          headers: { 'X-Master-Key': apiKey }
        });
        if (!res.ok) throw new Error('Could not access that bin. Check your API key and Bin ID.');
        localStorage.setItem(SYNC_KEY_API, apiKey);
        localStorage.setItem(SYNC_KEY_BIN, binId);
        await loadFromCloud();
      } else {
        localStorage.setItem(SYNC_KEY_API, apiKey);
        const newBinId = await createBin(apiKey);
        localStorage.setItem(SYNC_KEY_BIN, newBinId);
      }
      updateSyncIndicator('synced');
      overlay.remove();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Connect';
    }
  });
}

// ── Init ──
loadTasks();
render();
if (isSyncEnabled()) {
  updateSyncIndicator('idle');
  loadFromCloud();
}
</script>
